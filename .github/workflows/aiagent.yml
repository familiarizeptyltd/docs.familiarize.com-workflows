name: aiagent (main)

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Prompt content or path to a prompt file in the target repository'
        required: true
        default: 'prompts/switzerland-pages0-v5.md'
        type: string
      prompt_is_file:
        description: 'Whether the prompt input is a file path (true) or direct content (false)'
        required: false
        type: boolean
        default: true
      target_repo:
        description: 'Target repository to operate on (ORG/REPO format)'
        required: true
        default: 'familiarize/docs.familiarize.com'
        type: string
      llm_provider:
        description: 'LLM provider (openai/grok/professionalize)'
        required: false
        default: 'professionalize'
        type: choice
        options:
        - openai
        - grok
        - professionalize
      llm_model:
        description: 'LLM model'
        required: false
        default: 'gpt-oss'
        type: choice
        options:
        - gpt-oss
        - qwen3-235B-instruct
        - qwen3-next
        - Qwen2.5-VL-7B
        - gpt-5-mini
        - gpt-5-nano
        - gpt-4.1-mini
        - gpt-4.1-nano
        - gpt-4o-mini
      mode:
        description: 'aiAgent mode'
        required: false
        default: 'universal'
        type: choice
        options:
        - universal
        - orchestrator
        - architect
        - coder
        - debugger
      methodology:
        description: 'Execution methodology'
        required: false
        default: 'hybrid'
        type: choice
        options:
        - legacy
        - hybrid
      mcp_mode:
        description: 'MCP flag behavior'
        required: false
        default: 'disable'
        type: choice
        options:
        - disable
        - enable
        - default
      log_level:
        description: 'CLI log level'
        required: false
        default: 'debug'
        type: choice
        options:
        - debug
        - info
        - warning
        - error
      redact:
        description: 'Enable --redact'
        required: false
        type: boolean
        default: false
      no_result_content:
        description: 'Enable --no-result-content'
        required: false
        type: boolean
        default: false
      push_target_repo_changes:
        description: 'Enable push step for target repository changes'
        required: false
        type: boolean
        default: false
      aiagent_self_update:
        description: 'Enable aiagent self-update steps (generated tools/servers push)'
        required: false
        type: boolean
        default: false

jobs:
  execute-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout public workflow repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout aiAgent repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.AI_AGENT_REPO }}
          token: ${{ secrets.AI_AGENT_REPO_TOKEN }}
          path: aiagent
          fetch-depth: 0

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.REPO }}
          token: ${{ secrets.REPO_TOKEN }}
          path: target-repo
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r aiagent/requirements.txt

      - name: Setup aiAgent configuration
        run: |
          # Copy config if it exists in repo
          if [ -f "aiagent/config.yaml" ]; then
            mkdir -p /home/runner/.aiagent
            cp aiagent/config.yaml /home/runner/.aiagent/config.yaml
            echo "✓ Copied custom config.yaml"
          else
            echo "⚠ No custom config.yaml found, will use defaults"
          fi

      - name: Verify GitHub CLI
        run: |
          gh --version

      - name: Configure Git Identity
        run: |
          cd target-repo
          git config user.name "aiAgent"
          git config user.email "aiagent@aiagent.com"
          cd ..

      - name: Execute aiAgent
        env:
          PROFESSIONALIZE_API_KEY: ${{ secrets.PROFESSIONALIZE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GPT_OSS_API_KEY: ${{ secrets.GPT_OSS_API_KEY }}
          GPT_OSS_BASE_URL: ${{ secrets.GPT_OSS_BASE_URL }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GOOGLE_CUSTOM_SEARCH_API_KEY: ${{ secrets.GOOGLE_CUSTOM_SEARCH_API_KEY }}
          CUSTOM_SEARCH_ENGINE_ID: ${{ secrets.CUSTOM_SEARCH_ENGINE_ID }}
          GH_TOKEN: ${{ secrets.REPO_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          set -e
          
          # Get absolute workspace path
          WORKSPACE_PATH="$(cd ../target-repo && pwd)"
          echo "Workspace: $WORKSPACE_PATH"
          
          # Build aiAgent command as an argument array (safe for arbitrary prompt text)
          AIAGENT_CMD=(python -m aiagent.cli.main run)
          
          # Handle prompt (file or direct content)
          if [ "${{ github.event.inputs.prompt_is_file }}" = "true" ]; then
            # File prompt
            PROMPT_FILE="$WORKSPACE_PATH/${{ github.event.inputs.prompt }}"
            
            # Verify file exists
            if [ ! -f "$PROMPT_FILE" ]; then
              echo "Error: Prompt file '$PROMPT_FILE' does not exist."
              echo "Available files in prompts/:"
              ls -la "$WORKSPACE_PATH/prompts/" || true
              exit 1
            fi
            
            echo "Prompt file: $PROMPT_FILE"
            AIAGENT_CMD+=(--file "$PROMPT_FILE")
          else
            # Direct content prompt
            echo "Using direct prompt content"
            AIAGENT_CMD+=("${{ github.event.inputs.prompt }}")
          fi
          
          # Add common parameters
          AIAGENT_CMD+=(--workspace "$WORKSPACE_PATH")
          AIAGENT_CMD+=(--auto)
          AIAGENT_CMD+=(--mode "${{ github.event.inputs.mode }}")
          AIAGENT_CMD+=(--methodology "${{ github.event.inputs.methodology }}")
          
          # MCP flag mode
          if [ "${{ github.event.inputs.mcp_mode }}" = "disable" ]; then
            AIAGENT_CMD+=(--no-mcp)
          elif [ "${{ github.event.inputs.mcp_mode }}" = "enable" ]; then
            AIAGENT_CMD+=(--mcp)
          fi

          AIAGENT_CMD+=(--provider "${{ github.event.inputs.llm_provider }}")
          AIAGENT_CMD+=(--model "${{ github.event.inputs.llm_model }}")
          AIAGENT_CMD+=(--log-level "${{ github.event.inputs.log_level }}")
          
          # Optional security/output flags
          if [ "${{ github.event.inputs.redact }}" = "true" ]; then
            AIAGENT_CMD+=(--redact)
          fi
          if [ "${{ github.event.inputs.no_result_content }}" = "true" ]; then
            AIAGENT_CMD+=(--no-result-content)
          fi
          
          # Execute
          printf 'Executing:'
          printf ' %q' "${AIAGENT_CMD[@]}"
          printf '\n'
          "${AIAGENT_CMD[@]}"
          
        working-directory: aiagent

      - name: Push changes to target repository
        if: success() && github.event.inputs.push_target_repo_changes == 'true'
        run: |
          cd target-repo
          
          # Refresh remote state before checking for new commits
          git fetch origin main

          # Check if there are any commits to push
          if git log origin/main..HEAD --oneline | grep -q .; then
            echo "Changes detected, pushing to remote..."
            
            # Fetch and rebase to handle concurrent changes
            git rebase origin/main || {
              echo "⚠️ Rebase conflict - attempting merge instead"
              git rebase --abort || true
              git pull --no-edit origin main
            }
            
            git push origin main
            echo "✓ Changes pushed successfully"
          else
            echo "No changes to push"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}

      - name: Check for aiagent Updates
        if: github.event.inputs.aiagent_self_update == 'true'
        id: check_updates
        run: |
          cd aiagent
          if [ -f "generated_tools.json" ] || [ -f "new_servers.py" ]; then
            echo "updates_needed=true" >> $GITHUB_OUTPUT
            echo "aiagent generated new tools/servers during execution"
          else
            echo "updates_needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update aiagent Repository (if needed)
        if: github.event.inputs.aiagent_self_update == 'true' && steps.check_updates.outputs.updates_needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.AI_AGENT_REPO_TOKEN }}
        run: |
          cd aiagent
          
          # Configure git for aiagent repo updates
          git config user.name "aiAgent"
          git config user.email "aiagent@familiarize.com"
          
          # Add generated files
          git add generated_tools.json new_servers.py 2>/dev/null || true
          
          # Check if there are changes
          if git diff --staged --quiet; then
            echo "No new tools/servers to commit"
          else
            # Commit and push updates
            git commit -m "feat: Add dynamically generated tools and servers
            
            Generated during task execution:
            - New MCP servers for task requirements
            - Runtime-generated tools
            - Auto-generated by aiAgent"
            
            git push origin main
            echo "aiagent repository updated with new tools/servers"
          fi

      - name: Upload execution artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aiagent-execution-${{ github.run_id }}
          path: |
            target-repo/aiagent-run-*.log
            target-repo/.execution_report.json
            aiagent/generated_tools.json
            aiagent/new_servers.py
          if-no-files-found: ignore
          retention-days: 30
